server {
    listen 80;
    server_name logic.jazzzy.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name logic.jazzzy.cn;

    ssl_certificate /etc/letsencrypt/live/logic.jazzzy.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logic.jazzzy.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/logic.jazzzy.cn;
    index index.html;

    # 静态文件
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # CORS（FastAPI 已处理，nginx 不重复设置）
    }

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    access_log /var/log/nginx/logic.jazzzy.cn.access.log;
    error_log /var/log/nginx/logic.jazzzy.cn.error.log;
}
